# ============================================
# DOCKER COMPOSE - Full Stack Development
# ============================================

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: auriplan-db
    environment:
      POSTGRES_USER: auriplan
      POSTGRES_PASSWORD: auriplan_secret
      POSTGRES_DB: auriplan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auriplan"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: auriplan-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: auriplan-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://auriplan:auriplan_secret@db:5432/auriplan?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-super-secret-jwt-key-for-development
      CLIENT_URL: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npm run dev

  # Frontend
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: auriplan-web
    environment:
      VITE_API_URL: http://localhost:3001/api
      VITE_WS_URL: ws://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
