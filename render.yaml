# ============================================
# RENDER DEPLOYMENT CONFIGURATION
# ============================================

services:
  # Frontend Service
  - type: web
    name: auriplan-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # Backend Service
  - type: web
    name: auriplan-api
    env: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: auriplan-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://auriplan-frontend.onrender.com

databases:
  - name: auriplan-db
    databaseName: auriplan
    user: auriplan
    plan: free
